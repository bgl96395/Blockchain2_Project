name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FOUNDRY_PROFILE: ci

jobs:
  format-and-build:
    name: Format check and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify Solidity formatting
        run: forge fmt --check
        id: format-check

      - name: Compile contracts
        run: forge build --sizes
        id: build

  unit-and-fuzz-tests:
    name: Unit and fuzz tests
    runs-on: ubuntu-latest
    needs: format-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run unit and fuzz tests
        run: forge test -vvv --no-match-path "test/fork/**"

  invariant-tests:
    name: Invariant tests
    runs-on: ubuntu-latest
    needs: format-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run invariant tests
        run: forge test --match-path "test/invariant/**" -vvv

  coverage-report:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: format-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate coverage report
        run: forge coverage --report summary --no-match-path "test/fork/**"

  slither-static-analysis:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: format-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: medium
          slither-config: slither.config.json
