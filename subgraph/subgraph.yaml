specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ResourceMarketplace
    network: base-sepolia
    source:
      address: "0xd15e44a413e0f299ea7e3c9cd7be4c6b5e70cf26"
      abi: ResourceMarketplace
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LiquidityProvider
        - SwapEvent
        - LiquidityEvent
      abis:
        - name: ResourceMarketplace
          file: ./abis/ResourceMarketplace.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: ResourcesSwapped(indexed address,indexed uint256,indexed uint256,uint256,uint256)
          handler: handleResourcesSwapped
      file: ./src/marketplace.ts
  - kind: ethereum
    name: GameGovernor
    network: base-sepolia
    source:
      address: "0x9c8cb7209ac3153d43d6ab217c167f200dd9bb50"
      abi: GameGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
      abis:
        - name: GameGovernor
          file: ./abis/GameGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
      file: ./src/governance.ts
